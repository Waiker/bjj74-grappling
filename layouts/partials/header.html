{{ if not .IsHome }}
<header class="site-header">
  <div class="site-header__inner">
    <a href="/" class="site-header__logo">BJJ74</a>
    <nav class="site-header__nav" aria-label="Навигация">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="site-header__link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <a href="/contacts/" class="site-header__cta">Записаться</a>
  </div>
</header>
{{ end }}
