{{ define "main" }}
<article class="article">
  <div class="article-head">
    <p class="eyebrow">{{ if eq .Section "blog" }}Блог BJJ74{{ else }}BJJ74 / Челябинск{{ end }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
    {{ with .Params.tags }}
      <ul class="tag-list">
        {{ range . }}<li><span class="tag-pill">{{ . }}</span></li>{{ end }}
      </ul>
    {{ end }}
    {{ with .Params.cover }}
      <figure class="article-cover">
        <img src="{{ . }}" alt="{{ $.Params.coverAlt | default $.Title }}" loading="eager" decoding="async">
      </figure>
    {{ end }}
  </div>
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
