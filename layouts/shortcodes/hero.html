{{- $eyebrow := .Get "eyebrow" | default "Челябинск / мкрн. Привилегия" -}}
{{- $title := .Get "title" | default "Грепплинг No&#8209;Gi для взрослых." -}}
{{- $lead := .Get "lead" | default "" -}}
<section class="page-hero">
  <div class="page-hero__inner">
    <p class="eyebrow">{{ $eyebrow }}</p>
    <h1>{{ $title | safeHTML }}</h1>
    {{ with $lead }}<p class="lead">{{ . }}</p>{{ end }}
  </div>
</section>
